<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>손글씨 인식기</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>손글씨 인식기</h1>
    <p id="status" class="status">서버에 연결 중...</p>

    <div class="canvas-wrapper">
      <canvas id="drawCanvas" width="450" height="450"></canvas>
    </div>

    <div class="result-area">
      <span id="resultChar" class="result-digit">?</span>
    </div>

    <p class="section-label">상위 5개 후보</p>
    <div class="prob-grid" id="probGrid"></div>

    <div class="btn-row">
      <button id="btnPredict" class="btn btn-primary">인식</button>
      <button id="btnClear"   class="btn btn-secondary">지우기</button>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
